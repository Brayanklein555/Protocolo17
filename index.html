<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Fábrica Sombria - Capítulo 1</title>
<style>
body{margin:0;overflow:hidden;background:black;color:white;font-family:Arial;}
canvas{display:block;margin:auto;background:black;}
#menu, #gameOver, #letterBox, #codePanel{
position:absolute;width:100%;height:100%;
display:flex;justify-content:center;align-items:center;
flex-direction:column;background:rgba(0,0,0,0.9);
}
button{padding:10px 30px;font-size:18px;background:red;color:white;border:none;cursor:pointer;}
#letterBox, #gameOver, #codePanel{display:none;}
input{font-size:20px;text-align:center;}
</style>
</head>
<body>

<div id="menu">
<h1>FÁBRICA SOMBRIA</h1>
<button onclick="startGame()">START</button>
</div>

<div id="letterBox"></div>

<div id="codePanel">
<h2>Digite a Senha</h2>
<input id="codeInput">
<button onclick="checkCode()">Confirmar</button>
</div>

<div id="gameOver">
<h1>VOCÊ MORREU</h1>
<button onclick="location.reload()">Reiniciar</button>
</div>

<canvas id="game" width="1100" height="550"></canvas>

<script>
const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");

let gameStarted=false, reading=false, enteringCode=false;
let flashlight=true, flashlightEnergy=100;
let keys={}, gravity=0.6;
let currentRoom=0;
let batteries=0;
let generators=[false,false,false];
let bossActive=false, bossHP=3;

let player={x:50,y:450,w:40,h:40,dx:0,dy:0,speed:4,jump:-12,grounded:false};

let letters=[
{x:300,room:0,text:"Relatório: Código da porta é 1732"},
{x:600,room:1,text:"Geradores precisam de 3 baterias."}
];

let doors=[{room:0,locked:true,code:"1732"}];

let batteryItems=[
{x:500,room:0,collected:false},
{x:700,room:1,collected:false},
{x:900,room:2,collected:false}
];

let enemies=[
{x:800,type:"pisca"},
{x:600,type:"silencio"},
{x:700,type:"eco"}
];

let boss={x:900,y:450};

document.addEventListener("keydown",e=>{
keys[e.key]=true;
if(e.key==="f") flashlight=!flashlight;
if(e.key==="Enter" && reading){
document.getElementById("letterBox").style.display="none";
reading=false;
}
});
document.addEventListener("keyup",e=>keys[e.key]=false);

function startGame(){
document.getElementById("menu").style.display="none";
gameStarted=true;
}

function checkCode(){
let input=document.getElementById("codeInput").value;
if(input==="1732"){
doors[0].locked=false;
document.getElementById("codePanel").style.display="none";
enteringCode=false;
}
}

function update(){
if(!gameStarted||reading||enteringCode) return;

if(keys["a"]) player.dx=-player.speed;
else if(keys["d"]) player.dx=player.speed;
else player.dx=0;

if(keys[" "] && player.grounded){
player.dy=player.jump;
player.grounded=false;
}

player.dy+=gravity;
player.x+=player.dx;
player.y+=player.dy;

if(player.y>450){player.y=450;player.dy=0;player.grounded=true;}

letters.forEach(l=>{
if(l.room===currentRoom && Math.abs(player.x-l.x)<30){
reading=true;
let box=document.getElementById("letterBox");
box.innerText=l.text+"\n\nPressione ENTER";
box.style.display="flex";
}
});

batteryItems.forEach(b=>{
if(!b.collected && b.room===currentRoom && Math.abs(player.x-b.x)<30){
b.collected=true;
batteries++;
}
});

if(player.x>1050){
if(currentRoom===0 && doors[0].locked){
enteringCode=true;
document.getElementById("codePanel").style.display="flex";
}else{
currentRoom++;
player.x=10;
}
}

let enemy=enemies[currentRoom];
if(enemy){
if(enemy.type==="pisca" && Math.random()<0.02) enemy.x-=15;
if(enemy.type==="silencio" && !keys["a"]&&!keys["d"]) enemy.x+=(player.x<enemy.x?-1:1);
if(enemy.type==="eco" && (keys["a"]||keys["d"])) enemy.x+=(player.x<enemy.x?-1:1);
if(Math.abs(player.x-enemy.x)<30) gameOver();
}

if(currentRoom===3){
bossActive=true;
if(Math.abs(player.x-boss.x)<60) gameOver();
if(keys["e"] && batteries>=3){
bossHP--;
batteries=0;
}
if(bossHP<=0){
alert("Boss derrotado! Capítulo concluído!");
location.reload();
}
}

if(flashlight) flashlightEnergy-=0.05;
if(flashlightEnergy<=0) flashlight=false;
}

function draw(){
ctx.clearRect(0,0,canvas.width,canvas.height);

if(!gameStarted) return;

ctx.fillStyle="#111";
ctx.fillRect(0,0,canvas.width,canvas.height);

ctx.fillStyle="cyan";
ctx.fillRect(player.x,player.y,player.w,player.h);

batteryItems.forEach(b=>{
if(!b.collected && b.room===currentRoom){
ctx.fillStyle="yellow";
ctx.fillRect(b.x,450,20,20);
}
});

let enemy=enemies[currentRoom];
if(enemy){
ctx.fillStyle="red";
ctx.fillRect(enemy.x,450,40,40);
}

if(bossActive){
ctx.fillStyle="purple";
ctx.fillRect(boss.x,450,80,80);
}

if(!flashlight){
ctx.fillStyle="rgba(0,0,0,0.85)";
ctx.fillRect(0,0,canvas.width,canvas.height);
ctx.clearRect(player.x-100,player.y-100,250,250);
}

ctx.fillStyle="white";
ctx.fillText("Sala: "+(currentRoom+1),1000,20);
ctx.fillText("Baterias: "+batteries,20,20);
ctx.fillText("Energia Lanterna: "+Math.floor(flashlightEnergy),20,40);
}

function gameOver(){
document.getElementById("gameOver").style.display="flex";
}

function loop(){
update();
draw();
requestAnimationFrame(loop);
}
loop();
</script>

</body>
</html>
