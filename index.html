<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Fábrica Sombria - Protocolo 17</title>
<style>
    body {
        margin: 0;
        overflow: hidden;
        background: black;
        font-family: Arial;
        color: white;
    }
    canvas {
        background: #111;
        display: block;
        margin: auto;
    }
    #info {
        position: absolute;
        top: 10px;
        left: 10px;
    }
</style>
</head>
<body>

<div id="info">
Fusíveis: <span id="score">0</span>/3
</div>

<canvas id="game" width="900" height="500"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let keys = {};
let gravity = 0.6;

let player = {
    x: 100,
    y: 400,
    width: 40,
    height: 40,
    color: "cyan",
    dx: 0,
    dy: 0,
    speed: 5,
    jump: -12,
    grounded: false
};

let enemy = {
    x: 700,
    y: 400,
    width: 40,
    height: 40,
    color: "red",
    speed: 1.5
};

let platforms = [
    {x:0,y:450,width:900,height:50},
    {x:300,y:380,width:150,height:20},
    {x:550,y:320,width:150,height:20}
];

let items = [
    {x:320,y:340,collected:false},
    {x:580,y:280,collected:false},
    {x:800,y:410,collected:false}
];

let score = 0;
let gameOver = false;
let victory = false;

document.addEventListener("keydown", e => keys[e.key.toLowerCase()] = true);
document.addEventListener("keyup", e => keys[e.key.toLowerCase()] = false);

function update() {

    if(gameOver || victory) return;

    // Movimento horizontal
    if(keys["a"]) player.dx = -player.speed;
    else if(keys["d"]) player.dx = player.speed;
    else player.dx = 0;

    // Pulo
    if(keys[" "] && player.grounded) {
        player.dy = player.jump;
        player.grounded = false;
    }

    player.dy += gravity;
    player.x += player.dx;
    player.y += player.dy;

    // Colisão plataformas
    player.grounded = false;
    platforms.forEach(p => {
        if(player.x < p.x + p.width &&
           player.x + player.width > p.x &&
           player.y < p.y + p.height &&
           player.y + player.height > p.y) {

            if(player.dy > 0) {
                player.y = p.y - player.height;
                player.dy = 0;
                player.grounded = true;
            }
        }
    });

    // Limite tela
    if(player.x < 0) player.x = 0;
    if(player.x + player.width > canvas.width)
        player.x = canvas.width - player.width;

    // Inimigo persegue
    if(player.x < enemy.x) enemy.x -= enemy.speed;
    else enemy.x += enemy.speed;

    // Colisão inimigo
    if(player.x < enemy.x + enemy.width &&
       player.x + player.width > enemy.x &&
       player.y < enemy.y + enemy.height &&
       player.y + player.height > enemy.y) {
           gameOver = true;
    }

    // Coletar itens
    items.forEach(item => {
        if(!item.collected &&
           player.x < item.x + 20 &&
           player.x + player.width > item.x &&
           player.y < item.y + 20 &&
           player.y + player.height > item.y) {
               item.collected = true;
               score++;
               document.getElementById("score").textContent = score;
        }
    });

    if(score === 3) {
        victory = true;
    }
}

function draw() {
    ctx.clearRect(0,0,canvas.width,canvas.height);

    // Player
    ctx.fillStyle = player.color;
    ctx.fillRect(player.x,player.y,player.width,player.height);

    // Enemy
    ctx.fillStyle = enemy.color;
    ctx.fillRect(enemy.x,enemy.y,enemy.width,enemy.height);

    // Platforms
    ctx.fillStyle = "gray";
    platforms.forEach(p => {
        ctx.fillRect(p.x,p.y,p.width,p.height);
    });

    // Itens
    ctx.fillStyle = "yellow";
    items.forEach(item => {
        if(!item.collected)
            ctx.fillRect(item.x,item.y,20,20);
    });

    if(gameOver) {
        ctx.fillStyle = "red";
        ctx.font = "40px Arial";
        ctx.fillText("GAME OVER", 350, 250);
    }

    if(victory) {
        ctx.fillStyle = "lime";
        ctx.font = "40px Arial";
        ctx.fillText("ENERGIA RESTAURADA!", 250, 250);
    }
}

function gameLoop() {
    update();
    draw();
    requestAnimationFrame(gameLoop);
}

gameLoop();
</script>

</body>
</html>
